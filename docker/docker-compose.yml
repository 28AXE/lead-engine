version: "3.11"

services:
  lead-engine:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: lead-engine
    volumes:
      # Mount config directory for custom verticals
      - ../config:/app/config
      # Mount outputs to retrieve results
      - ../outputs:/app/outputs
      # Mount .env for API keys
      - ../.env:/app/.env
    environment:
      # API keys loaded from .env file
      - VIBE_PROSPECTING_API_KEY=${VIBE_PROSPECTING_API_KEY}
      - WHOISXML_API_KEY=${WHOISXML_API_KEY}
      - HUNTER_IO_API_KEY=${HUNTER_IO_API_KEY}
      - PAPPERS_API_KEY=${PAPPERS_API_KEY}
      - META_AD_LIBRARY_TOKEN=${META_AD_LIBRARY_TOKEN}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - APIFY_API_TOKEN=${APIFY_API_TOKEN}
      - GOOGLE_ADS_API_KEY=${GOOGLE_ADS_API_KEY}
      - LINKEDIN_JOBS_API_KEY=${LINKEDIN_JOBS_API_KEY}
    # Default: dry-run mode
    command: python -m src.main --dry-run
    # For production runs, use:
    # command: python -m src.main
    restart: "no"
